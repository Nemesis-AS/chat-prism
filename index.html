<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ChatPrism</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a1a;
        color: #e8e8e8;
      }

      header {
        padding: 14px 16px 12px;
        border-bottom: 1px solid #2e2e2e;
      }

      header h1 {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #a0a0a0;
      }

      .features {
        padding: 6px 0;
      }

      .feature-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        transition: background 0.15s;
      }

      .feature-row:hover {
        background: #222;
      }

      .feature-info {
        flex: 1;
        min-width: 0;
      }

      .feature-name {
        font-size: 0.875rem;
        font-weight: 500;
        color: #e8e8e8;
      }

      .feature-desc {
        font-size: 0.72rem;
        color: #666;
        margin-top: 2px;
      }

      /* Toggle switch */
      .toggle {
        position: relative;
        flex-shrink: 0;
        width: 36px;
        height: 20px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .toggle-track {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        background: #3a3a3a;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #888;
        transition: transform 0.2s, background 0.2s;
      }

      .toggle input:checked + .toggle-track {
        background: #10a37f;
      }

      .toggle input:checked + .toggle-track::after {
        transform: translateX(16px);
        background: #fff;
      }

      /* Export button */
      .actions {
        padding: 8px 16px 12px;
        border-top: 1px solid #2e2e2e;
      }

      .btn-export {
        width: 100%;
        padding: 7px 12px;
        border: 1px solid #3a3a3a;
        border-radius: 6px;
        background: #242424;
        color: #c8c8c8;
        font-size: 0.8rem;
        font-family: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }

      .btn-export:hover {
        background: #2e2e2e;
        color: #e8e8e8;
        border-color: #484848;
      }

      .btn-export:active {
        background: #1a1a1a;
      }

      .btn-export.error {
        color: #e05c5c;
        border-color: #5c2a2a;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ChatPrism</h1>
    </header>

    <div class="features">
      <div class="feature-row">
        <div class="feature-info">
          <div class="feature-name">Color Swatches</div>
          <div class="feature-desc">Preview &amp; copy hex colors in code blocks</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-color-swatches" />
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="actions">
      <button class="btn-export" id="btn-export">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export Chat
      </button>
    </div>

    <script src="scripts/popup.js"></script>
  </body>
</html>
